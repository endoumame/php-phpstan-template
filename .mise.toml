[tools]
php = "8.5"
lefthook = "latest"

[tasks.test]
description = "Run all PHPUnit tests"
run = "./vendor/bin/phpunit"

[tasks."test:unit"]
description = "Run unit tests only"
run = "./vendor/bin/phpunit --testsuite Unit"

[tasks."test:property"]
description = "Run property-based tests only"
run = "./vendor/bin/phpunit --testsuite Property"

[tasks."test:integration"]
description = "Run integration tests only"
run = "./vendor/bin/phpunit --testsuite Integration"

[tasks.phpcs]
description = "Run PHP_CodeSniffer style checks"
run = "./vendor/bin/phpcs"

[tasks.phpcbf]
description = "Auto-fix coding standard violations"
run = "./vendor/bin/phpcbf"

[tasks.phpstan]
description = "Run PHPStan static analysis"
run = "./vendor/bin/phpstan analyse"

[tasks.check]
description = "Run all checks (phpcs, phpstan, test)"
depends = ["phpcs", "phpstan", "test"]

[tasks."lefthook:install"]
description = "Install lefthook git hooks"
run = "lefthook install"

[tasks.serve]
description = "Start PHP built-in development server"
run = "php -S localhost:8080 -t public"
